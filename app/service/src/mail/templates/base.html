<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="x-apple-disable-message-reformatting">
    <meta name="format-detection" content="telephone=no,date=no,address=no,email=no">
    <title>{% block title %}MYNAB{% endblock %}</title>
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
    <style>
        #outlook a { padding: 0; }
        .ReadMsgBody { width: 100%; }
        .ExternalClass { width: 100%; }
        .ExternalClass * { line-height: 100%; }
        body {
            margin: 0; padding: 0;
            background-color: #eef0f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }
        table { border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; -ms-interpolation-mode: bicubic; }
        @media only screen and (max-width: 620px) {
            .wrapper { width: 100% !important; }
            .content-cell { padding: 28px 20px !important; }
            .footer-cell { padding: 20px !important; }
            .code-cell { padding: 20px 16px !important; font-size: 34px !important; letter-spacing: 8px !important; }
        }
    </style>
</head>
<body style="margin:0; padding:0; background-color:#eef0f5;">

<!-- Outer wrapper -->
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0"
       style="background-color:#eef0f5; padding: 32px 16px;">
    <tr>
        <td align="center">

            <!-- Email container -->
            <table role="presentation" class="wrapper" width="600" cellspacing="0" cellpadding="0" border="0"
                   style="max-width:600px; width:100%; background-color:#ffffff;
                          border-radius:12px; overflow:hidden;
                          border:1px solid #d0d5e0;
                          box-shadow: 0 4px 24px rgba(28,37,56,0.10);">

                <!-- ═══════════════ HEADER ═══════════════ -->
                <tr>
                    <td style="background-color:#1c2538; padding: 36px 40px 32px; text-align:center;">

                        <!-- Logo mark -->
                        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                            <tr>
                                <td align="center" style="padding-bottom:16px;">
                                    <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                                        <tr>
                                            <td style="background-color:#2c3a54; border:1px solid #3d5070;
                                                       border-radius:10px; padding: 10px 18px;">
                                                <span style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
                                                             font-size:22px; font-weight:800; color:#ffffff;
                                                             letter-spacing:2px; text-transform:uppercase;">
                                                    MYNAB
                                                </span>
                                            </td>
                                        </tr>
                                    </table>
                                </td>
                            </tr>
                            <tr>
                                <td align="center">
                                    <p style="margin:0; font-size:15px; font-weight:400; color:#8fa3bf;
                                              letter-spacing:0.3px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;">
                                        {% block header_subtitle %}Maybe You Need A Budget{% endblock %}
                                    </p>
                                </td>
                            </tr>
                        </table>

                    </td>
                </tr>

                <!-- Accent stripe -->
                <tr>
                    <td style="background: linear-gradient(90deg, #1c2538 0%, #4d6c8a 50%, #1c2538 100%);
                               height:3px; font-size:0; line-height:0;">&nbsp;</td>
                </tr>

                <!-- ═══════════════ CONTENT ═══════════════ -->
                <tr>
                    <td class="content-cell" style="padding: 40px 48px; background-color:#ffffff;">
                        {% block content %}{% endblock %}
                    </td>
                </tr>

                <!-- Divider -->
                <tr>
                    <td style="padding: 0 48px;">
                        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                            <tr>
                                <td style="border-top:1px solid #e4e7ef; font-size:0; line-height:0;">&nbsp;</td>
                            </tr>
                        </table>
                    </td>
                </tr>

                <!-- ═══════════════ FOOTER ═══════════════ -->
                <tr>
                    <td class="footer-cell" style="background-color:#f5f6fa; padding: 28px 48px 32px; text-align:center; border-radius:0 0 12px 12px;">
                        {% block footer %}
                        <p style="margin:0 0 12px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
                                  font-size:13px; color:#667085;">
                            <a href="https://mynab.up.railway.app" style="color:#4d6c8a; text-decoration:none; font-weight:500;">MYNAB App</a>
                            &nbsp;&middot;&nbsp;
                            <a href="mailto:support@mynab.com" style="color:#4d6c8a; text-decoration:none; font-weight:500;">Support</a>
                        </p>
                        <p style="margin:0 0 8px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
                                  font-size:12px; color:#9ba3b6;">
                            &copy; 2025 MYNAB &mdash; All rights reserved.
                        </p>
                        <p style="margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
                                  font-size:12px; color:#b0b8cc; line-height:1.5;">
                            You received this email because you have an account with MYNAB.
                        </p>
                        {% endblock %}
                    </td>
                </tr>

            </table>
            <!-- / Email container -->

        </td>
    </tr>
</table>

</body>
</html>
